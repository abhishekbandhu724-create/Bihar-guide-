<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Explore Bihar — International Travel Guide</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    /* CSS Styles remain the same as your original provided code */
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--sand:#f5efe6;--clay:#c8733a;--deep:#1a1208;--warm:#8b5e3c;--leaf:#4a7c59;--gold:#d4a017;--muted:#6b5b4e;--white:#fffdf9}
    html{scroll-behavior:smooth}
    body{font-family:'DM Sans',sans-serif;background:var(--white);color:var(--deep);overflow-x:hidden}
    nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:1rem 3rem;background:rgba(255,253,249,0.95);backdrop-filter:blur(10px);border-bottom:1px solid rgba(200,115,58,0.15)}
    .logo{font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:700;color:var(--clay)}
    .logo span{color:var(--deep);font-style:italic}
    nav ul{list-style:none;display:flex;gap:1.6rem}
    nav ul li a{text-decoration:none;color:var(--muted);font-size:0.83rem;font-weight:500;transition:color 0.2s}
    nav ul li a:hover{color:var(--clay)}
    .nav-right{display:flex;align-items:center;gap:1rem}
    .nav-loc{font-size:0.76rem;color:var(--leaf);font-weight:500}
    .nav-wish-btn{background:var(--sand);border:1px solid rgba(200,115,58,0.25);cursor:pointer;font-size:0.82rem;padding:0.38rem 0.9rem;border-radius:100px;display:flex;align-items:center;gap:0.4rem;color:var(--warm);font-family:'DM Sans',sans-serif;font-weight:500;transition:all 0.2s}
    .nav-wish-btn:hover{background:var(--clay);color:#fff;border-color:var(--clay)}
    .wcount{background:var(--clay);color:#fff;font-size:0.6rem;font-weight:700;border-radius:50%;min-width:15px;height:15px;display:none;align-items:center;justify-content:center;padding:0 2px}
    .hero{min-height:100vh;background:linear-gradient(160deg,#1a1208 0%,#3d2208 45%,#6a3a18 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:8rem 2rem 4rem;position:relative;overflow:hidden}
    .hero-badge{display:inline-block;background:rgba(212,160,23,0.15);border:1px solid rgba(212,160,23,0.4);color:var(--gold);font-size:0.73rem;font-weight:500;letter-spacing:2px;text-transform:uppercase;padding:0.4rem 1.2rem;border-radius:100px;margin-bottom:1.8rem}
    .hero h1{font-family:'Playfair Display',serif;font-size:clamp(2.8rem,8vw,6rem);font-weight:700;color:var(--white);line-height:1.05;margin-bottom:1.2rem}
    .hero h1 em{color:var(--clay);font-style:italic}
    .hero p{max-width:580px;font-size:1rem;color:rgba(255,253,249,0.65);line-height:1.7;margin:0 auto 2rem}
    .btn-primary{background:var(--clay);color:var(--white);padding:0.8rem 1.8rem;border-radius:8px;font-size:0.88rem;font-weight:500;text-decoration:none;transition:all 0.2s;border:none;cursor:pointer}
    .btn-outline{background:transparent;color:var(--white);padding:0.8rem 1.8rem;border-radius:8px;font-size:0.88rem;font-weight:500;text-decoration:none;border:1px solid rgba(255,253,249,0.3);transition:all 0.2s;cursor:pointer}
    .loc-banner{background:linear-gradient(90deg,var(--leaf),#2d5c3f);color:var(--white);padding:0.9rem 2rem;display:flex;align-items:center;justify-content:center;gap:1rem;font-size:0.86rem;flex-wrap:wrap;text-align:center}
    .search-section{padding:3rem 2rem;background:var(--sand);display:flex;flex-direction:column;align-items:center}
    .search-bar{display:flex;max-width:740px;width:100%;background:var(--white);border-radius:12px;box-shadow:0 4px 24px rgba(26,18,8,0.08);overflow:hidden;border:1px solid rgba(200,115,58,0.2)}
    .search-bar input{flex:1;padding:0.9rem 1.3rem;border:none;outline:none;font-size:0.92rem}
    .search-bar button{background:var(--clay);color:var(--white);border:none;padding:0.9rem 1.6rem;cursor:pointer}
    .cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:1.5rem;max-width:1280px;margin:0 auto}
    .card{border-radius:16px;overflow:hidden;background:var(--white);box-shadow:0 2px 14px rgba(26,18,8,0.07);transition:transform 0.3s;position:relative}
    .card-img{width:100%;height:190px;display:flex;align-items:center;justify-content:center;font-size:3.2rem;position:relative}
    .card-body{padding:1.2rem 1.3rem}
    .card-btn{display:inline-flex;align-items:center;gap:0.28rem;padding:0.3rem 0.7rem;border-radius:100px;border:1px solid rgba(200,115,58,0.2);background:transparent;color:var(--warm);font-size:0.71rem;cursor:pointer;transition:all 0.18s;text-decoration:none}
    .card-btn:hover{background:var(--clay);color:#fff}
    .currency-box{background:var(--white);border-radius:18px;padding:2rem 2.2rem;box-shadow:0 4px 28px rgba(26,18,8,0.08);max-width:940px;margin:0 auto}
    .cur-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(125px,1fr));gap:0.7rem;margin-top:1rem}
    .cur-card{background:var(--sand);border-radius:12px;padding:0.9rem 0.75rem;text-align:center;border:1px solid rgba(200,115,58,0.1)}
    .ai-fab{position:fixed;bottom:2rem;right:2rem;z-index:150;background:var(--clay);color:#fff;border:none;border-radius:50px;padding:0.85rem 1.4rem;cursor:pointer;box-shadow:0 6px 24px rgba(200,115,58,0.45);display:flex;align-items:center;gap:0.5rem}
    .ai-panel{position:fixed;bottom:5.5rem;right:2rem;width:385px;max-width:calc(100vw - 2.5rem);height:530px;background:var(--white);border-radius:20px;box-shadow:0 20px 60px rgba(26,18,8,0.22);z-index:151;display:none;flex-direction:column;overflow:hidden}
    .ai-panel.open{display:flex}
    .ai-msgs{flex:1;overflow-y:auto;padding:1rem;display:flex;flex-direction:column;gap:0.72rem}
    .ai-msg{max-width:87%;padding:0.7rem 0.95rem;border-radius:14px;font-size:0.82rem}
    .ai-msg.bot{background:var(--sand);align-self:flex-start}
    .ai-msg.user{background:var(--clay);color:#fff;align-self:flex-end}
    .ai-inp-row{display:flex;gap:0.5rem;padding:0.75rem 1rem;border-top:1px solid rgba(200,115,58,0.1)}
    .ai-inp-row input{flex:1;padding:0.58rem 0.9rem;border:1px solid rgba(200,115,58,0.2);border-radius:10px;outline:none}
  </style>
</head>
<body>

<nav>
  <div class="logo">Explore <span>Bihar</span></div>
  <div class="nav-right">
    <button class="nav-wish-btn" onclick="toggleWish()">❤️ Wishlist <span class="wcount" id="wCount"></span></button>
    <div class="nav-loc" id="navLoc">📍 Detecting…</div>
  </div>
</nav>

<section class="hero">
  <div class="hero-badge">🌏 Free International Travel Guide</div>
  <h1>Ancient Soul of <em>Bihar</em></h1>
  <p>20 destinations with AI planning, live weather, and currency tools.</p>
  <div class="hero-cta">
    <a href="#destinations" class="btn-primary">Explore Destinations</a>
  </div>
</section>

<div class="loc-banner">
  <span>📍 <strong>Location:</strong> <span id="locName">Detecting…</span></span>
</div>

<div class="search-section">
  <div class="search-bar">
    <input type="text" placeholder="Search places..." id="searchInput" oninput="renderCards()"/>
    <button onclick="renderCards()">Search</button>
  </div>
</div>

<section id="destinations">
  <div class="cards-grid" id="cardsGrid"></div>
</section>

<section id="currency" style="padding:4rem 2rem; background:var(--sand)">
  <div class="currency-box">
    <h2 style="margin-bottom:1rem">💱 Currency Converter (Live Rates)</h2>
    <div style="display:flex; gap:1rem; margin-bottom:1rem">
      <input type="number" id="curAmt" value="100" oninput="doConvert()" style="padding:0.5rem; border-radius:8px; border:1px solid #ccc"/>
      <select id="curFrom" onchange="doConvert()" style="padding:0.5rem; border-radius:8px">
        <option value="USD">🇺🇸 USD</option>
        <option value="EUR">🇪🇺 EUR</option>
        <option value="GBP">🇬🇧 GBP</option>
        <option value="INR" selected>🇮🇳 INR</option>
      </select>
    </div>
    <div class="cur-grid" id="curGrid"></div>
  </div>
</section>

<button class="ai-fab" onclick="toggleAI()">🤖 AI Trip Planner</button>

<div class="ai-panel" id="aiPanel">
  <div style="padding:1rem; background:var(--clay); color:#white; display:flex; justify-content:space-between">
    <span style="color:white; font-weight:bold">Bihar AI Assistant</span>
    <button onclick="toggleAI()" style="background:none; border:none; color:white; cursor:pointer">✕</button>
  </div>
  <div class="ai-msgs" id="aiMsgs">
    <div class="ai-msg bot">Namaste! Ask me to plan your Bihar trip.</div>
  </div>
  <div class="ai-inp-row">
    <input type="text" id="aiInp" placeholder="Type message..." onkeydown="if(event.key==='Enter')sendAI()"/>
    <button onclick="sendAI()" style="background:var(--clay); color:white; border:none; padding:0.5rem 1rem; border-radius:8px; cursor:pointer">Send</button>
  </div>
</div>

<script>
/* ===== DATA ===== */
const D=[
  {rank:1,name:"Bodh Gaya",tag:"Spiritual · UNESCO",emoji:"🪷",bg:"#4a7c59",desc:"Where Buddha attained enlightenment.",loc:"Gaya",entry:"Free",travel:"2hr from Patna",lat:24.6961,lng:84.9914},
  {rank:2,name:"Nalanda University",tag:"Historical · UNESCO",emoji:"🏛️",bg:"#8b5e3c",desc:"World's oldest university ruins.",loc:"Nalanda",entry:"₹600 Foreign",travel:"90km from Patna",lat:25.1356,lng:85.4444},
  {rank:3,name:"Patna",tag:"Capital City",emoji:"🌆",bg:"#d4a017",desc:"Ancient Pataliputra, modern hub.",loc:"Patna",entry:"Museum ₹100",travel:"Main Hub",lat:25.5941,lng:85.1376}
];

let uLat=null, uLng=null, rates={};
let wishlist=JSON.parse(localStorage.getItem('bihar_wl')||'[]');

/* ===== LOCATION & CARDS ===== */
if(navigator.geolocation){
  navigator.geolocation.getCurrentPosition(p=>{
    uLat=p.coords.latitude; uLng=p.coords.longitude;
    document.getElementById('locName').textContent = `${uLat.toFixed(2)}, ${uLng.toFixed(2)}`;
    renderCards();
  });
}

function renderCards(){
  const s = document.getElementById('searchInput').value.toLowerCase();
  const grid = document.getElementById('cardsGrid');
  const filtered = D.filter(d => d.name.toLowerCase().includes(s));
  
  grid.innerHTML = filtered.map(d => `
    <div class="card">
      <div class="card-img" style="background:${d.bg}">${d.emoji}</div>
      <div class="card-body">
        <h3>${d.name}</h3>
        <p>${d.desc}</p>
        <div style="margin:1rem 0; font-size:0.8rem">📍 ${d.loc} | 🎟️ ${d.entry}</div>
        <button class="card-btn" onclick="window.open('https://www.google.com/maps?q=${d.lat},${d.lng}')">🗺️ Maps</button>
      </div>
    </div>
  `).join('');
}

/* ===== FIXED CURRENCY CONVERTER (No Key Needed) ===== */
const CTARGETS=[
  {code:'INR',flag:'🇮🇳',name:'Rupee'},
  {code:'USD',flag:'🇺🇸',name:'US Dollar'},
  {code:'EUR',flag:'🇪🇺',name:'Euro'},
  {code:'GBP',flag:'🇬🇧',name:'Pound'}
];

async function loadRates(){
  try{
    const r = await fetch('https://api.frankfurter.app/latest?from=INR');
    const j = await r.json();
    rates = j.rates;
    rates['INR'] = 1;
    doConvert();
  } catch(e) { console.error("Currency load failed"); }
}

function doConvert(){
  if(!Object.keys(rates).length) return;
  const amt = parseFloat(document.getElementById('curAmt').value) || 0;
  const from = document.getElementById('curFrom').value;
  
  // Pivot everything through INR
  const inrBase = from === 'INR' ? amt : amt / rates[from];

  document.getElementById('curGrid').innerHTML = CTARGETS.map(c => {
    const val = inrBase * rates[c.code];
    return `<div class="cur-card">
      <div>${c.flag}</div>
      <div style="font-weight:bold">${val.toFixed(2)}</div>
      <div style="font-size:0.7rem">${c.code}</div>
    </div>`;
  }).join('');
}

/* ===== FIXED AI AGENT (Gemini 1.5 Flash Free Tier) ===== */
async function sendAI(){
  const inp = document.getElementById('aiInp');
  const msg = inp.value.trim(); if(!msg) return;
  
  addAIMsg('user', msg);
  inp.value = '';
  
  // Note: To use this, get a FREE key from https://aistudio.google.com/
  // Use a proxy or environment variables for safety in production.
  const API_KEY = "PASTE_YOUR_GEMINI_API_KEY_HERE"; 
  const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;

  try {
    const res = await fetch(url, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        contents: [{ parts: [{ text: `You are an expert Bihar travel guide assistant. User asked: ${msg}. Provide a short, helpful response with emojis.` }]}]
      })
    });
    const data = await res.json();
    const botReply = data.candidates[0].content.parts[0].text;
    addAIMsg('bot', botReply);
  } catch(e) {
    addAIMsg('bot', "⚠️ Please add a Gemini API Key to the code to activate AI.");
  }
}

function addAIMsg(role, text){
  const el = document.getElementById('aiMsgs');
  const div = document.createElement('div');
  div.className = `ai-msg ${role}`;
  div.textContent = text;
  el.appendChild(div);
  el.scrollTop = el.scrollHeight;
}

function toggleAI(){ document.getElementById('aiPanel').classList.toggle('open'); }

// Init
renderCards();
loadRates();
</script>
</body>
</html>
